<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careloop - Casual Healthcare Services</title>

<style>
*{
    font-family:"Times New Roman", Times, serif !important;
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
}

header{
    background:white;
    padding:15px 40px;
    position:sticky;
    top:0;
    z-index:100;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
    align-items:center;
}

nav a{
    text-decoration:none;
    font-weight:bold;
    color:#667eea;
}

section{
    padding:60px 20px;
    text-align:center;
    color:white;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    margin-top:40px;
}

.service-card{
    background:white;
    padding:30px;
    border-radius:15px;
    cursor:pointer;
    color:#333;
    transition:0.3s;
}

.service-card:hover{
    transform:translateY(-8px);
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:500px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#667eea;
    color:white;
    padding:12px;
    border:none;
    cursor:pointer;
}

.success{
    color:green;
    margin-top:10px;
}

.contact-box{
    background:white;
    color:#333;
    padding:30px;
    border-radius:15px;
    display:inline-block;
}

.contact-box a{
    display:block;
    margin:10px 0;
    color:#667eea;
    font-weight:bold;
    text-decoration:none;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<header>
<nav>
<div><b>Careloop</b></div>
<ul>
<li>
<select id="langSelect">
<option value="ja" selected>日本語</option>
<option value="en">English</option>
</select>
</li>
</ul>
</nav>
</header>

<section>
<h1 id="homeTitle">ケアループへようこそ</h1>

<div class="services">
<div class="service-card" onclick="openForm('doorstep')">
<h3 id="doorTitle">🚚 訪問診療</h3>
</div>

<div class="service-card" onclick="openForm('doctor')">
<h3 id="docTitle">👨‍⚕️ 医師相談</h3>
</div>

<div class="service-card" onclick="openForm('physio')">
<h3 id="phyTitle">💪 理学療法</h3>
</div>
</div>
</section>

<!-- CONTACT SECTION -->
<section>
<h2 id="contactTitle">お問い合わせ</h2>
<div class="contact-box">
<a href="tel:+918838397429" id="contactPhone">📞 +91 88383 97429</a>
<a href="mailto:careloop2026@gmail.com" id="contactEmail">📧 careloop2026@gmail.com</a>
<a href="https://www.instagram.com/_.careloop._?igsh=czRzYTVjbjhra251" target="_blank" id="contactInsta">📷 Instagram</a>
</div>
</section>

<div class="modal" id="formModal">
<div class="modal-content">
<h2 id="formTitle"></h2>
<form id="serviceForm">
<div id="formFields"></div>
<button type="submit" id="submitBtn"></button>
<p class="success" id="successMsg"></p>
</form>
</div>
</div>

<footer>
<p id="footerText">© 2026 ケアループ. 全著作権所有。</p>
</footer>

<script>

const translations={
ja:{
homeTitle:"ケアループへようこそ",
doorTitle:"🚚 訪問診療",
docTitle:"👨‍⚕️ 医師相談",
phyTitle:"💪 理学療法",
contactTitle:"お問い合わせ",
contactPhone:"📞 電話: +91 88383 97429",
contactEmail:"📧 メール: careloop2026@gmail.com",
contactInsta:"📷 インスタグラム",
footerText:"© 2026 ケアループ. 全著作権所有。",
submit:"送信",
success:"送信が成功しました！"
},
en:{
homeTitle:"Welcome to Careloop",
doorTitle:"🚚 Doorstep Visit",
docTitle:"👨‍⚕️ Doctor Consultation",
phyTitle:"💪 Physiotherapy",
contactTitle:"Contact Us",
contactPhone:"📞 Mobile: +91 88383 97429",
contactEmail:"📧 Email: careloop2026@gmail.com",
contactInsta:"📷 Instagram",
footerText:"© 2026 Careloop. All rights reserved.",
submit:"Submit",
success:"Submitted successfully!"
}
};

let currentLang="ja";

document.getElementById("langSelect").addEventListener("change",function(){
currentLang=this.value;
changeLanguage();
});

function changeLanguage(){
document.documentElement.lang=currentLang;
for(let key in translations[currentLang]){
if(document.getElementById(key)){
document.getElementById(key).textContent=translations[currentLang][key];
}
}
}

changeLanguage();

/* Forms remain same as before */

function openForm(type){
document.getElementById("formModal").style.display="flex";
document.getElementById("successMsg").textContent="";
let fields="";

if(type==="doorstep"){
document.getElementById("formTitle").textContent=currentLang==="ja"?"訪問診療":"Doorstep Visit";
fields=`
<input required placeholder="${currentLang==="ja"?"名前":"Name"}">
<input required type="number" placeholder="${currentLang==="ja"?"年齢":"Age"}">
<select required>
<option value="">${currentLang==="ja"?"性別":"Gender"}</option>
<option>${currentLang==="ja"?"男性":"Male"}</option>
<option>${currentLang==="ja"?"女性":"Female"}</option>
</select>
<textarea required placeholder="${currentLang==="ja"?"住所":"Address"}"></textarea>
<textarea required placeholder="${currentLang==="ja"?"症状":"Concern"}"></textarea>
<select required>
<option value="">${currentLang==="ja"?"医師または看護師":"Doctor or Nurse"}</option>
<option>${currentLang==="ja"?"医師":"Doctor"}</option>
<option>${currentLang==="ja"?"看護師":"Nurse"}</option>
</select>
`;
}

if(type==="doctor"){
document.getElementById("formTitle").textContent=currentLang==="ja"?"医師相談":"Doctor Consultation";
fields=`
<input required placeholder="${currentLang==="ja"?"名前":"Name"}">
<input required type="number" placeholder="${currentLang==="ja"?"年齢":"Age"}">
<select required>
<option value="">${currentLang==="ja"?"性別":"Gender"}</option>
<option>${currentLang==="ja"?"男性":"Male"}</option>
<option>${currentLang==="ja"?"女性":"Female"}</option>
</select>
<textarea required placeholder="${currentLang==="ja"?"症状":"Concern"}"></textarea>
<select required>
<option value="">${currentLang==="ja"?"診察方法":"Consulting Type"}</option>
<option>${currentLang==="ja"?"対面":"In Person"}</option>
<option>${currentLang==="ja"?"ビデオ通話":"Video Call"}</option>
</select>
`;
}

if(type==="physio"){
document.getElementById("formTitle").textContent=currentLang==="ja"?"理学療法":"Physiotherapy";
fields=`
<input required placeholder="${currentLang==="ja"?"名前":"Name"}">
<input required type="number" placeholder="${currentLang==="ja"?"年齢":"Age"}">
<input required type="tel" placeholder="${currentLang==="ja"?"電話番号":"Phone Number"}">
<select required>
<option value="">${currentLang==="ja"?"性別":"Gender"}</option>
<option>${currentLang==="ja"?"男性":"Male"}</option>
<option>${currentLang==="ja"?"女性":"Female"}</option>
</select>
<textarea required placeholder="${currentLang==="ja"?"怪我/痛み":"Injury/Pain"}"></textarea>
`;
}

document.getElementById("formFields").innerHTML=fields;
document.getElementById("submitBtn").textContent=translations[currentLang].submit;
}

document.getElementById("serviceForm").addEventListener("submit",function(e){
e.preventDefault();
document.getElementById("successMsg").textContent=translations[currentLang].success;
this.reset();
});

window.onclick=function(e){
if(e.target===document.getElementById("formModal")){
document.getElementById("formModal").style.display="none";
}
};

</script>

</body>
</html>
